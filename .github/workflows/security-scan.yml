# See configuration in .qubership/docker.cfg
# See documentation: https://github.com/Netcracker/qubership-workflow-hub/tree/main/actions/docker-config-resolver

name: Security Scan Docker Packages
run-name: >
  Security Scan #${{ github.run_number }} for ${{ inputs.image || 'all repository docker images' }}
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target type for the scan (docker, etc.)"
        required: false
        type: choice
        options:
          - docker
          - source
      image:
        description: "Docker image (for docker). By default ghcr.io/<owner>/<repo>:<tag> from configuration file is used."
        required: false
        default: ""
        type: string
      tag:
        description: "Tag of the image to scan."
        required: false
        default: ""
        type: string
      only-high-critical:
        description: "Scope only HIGH + CRITICAL"
        required: false
        default: true
        type: boolean
      trivy-scan:
        description: "Trivy scan"
        required: false
        default: true
        type: boolean
      grype-scan:
        description: "Grype scan"
        required: false
        default: true
        type: boolean
      continue-on-error:
        description: "Continue on error"
        required: false
        default: true
        type: boolean
      only-fixed:
        description: "Ignore unfixed vulnerabilities"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 1 * * 0" # every Sunday at 01:00 UTC

jobs:
  load-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      packages: ${{ steps.display-config.outputs.filtered }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

        # See: https://github.com/Netcracker/qubership-workflow-hub/tree/main/actions/docker-config-resolver
      - name: Get Configuration File
        uses: netcracker/qubership-workflow-hub/actions/docker-config-resolver@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
        id: config
        with:
          file-path: ".qubership/docker.cfg"

      - name: Display Resolved Configuration
        id: display-config
        env:
          CONFIG_JSON: ${{ steps.config.outputs.config }}
          MANUAL_IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail
          echo "Resolved Configuration:"
          FILTERED=$(echo "$CONFIG_JSON" | jq -c '[.[] | select(.security_scan == true)]')

          echo "Filtered pretty:"
          echo "$FILTERED" | jq .

          echo "filtered=$FILTERED" >> "$GITHUB_OUTPUT"

          if [ "$(echo "$FILTERED" | jq 'length')" -eq 0 ]; then
            echo "No scan items on configuration."
            if [ -n "${MANUAL_IMAGE:-}" ]; then
              echo "Manual image provided; skipping matrix run."
              exit 0
            fi
            exit 1
          fi

  security-scan-matrix:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    permissions:
      contents: read
      security-events: write
      packages: read
    needs: load-config
    strategy:
      matrix:
        package: ${{ fromJson(needs.load-config.outputs.packages) }}

    name: "Scan (matrix)"
    uses: netcracker/qubership-workflow-hub/.github/workflows/re-security-scan.yml@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
    with:
      target: ${{ inputs.target || 'docker' }}
      image: ${{ format('{0}:{1}', matrix.package.image, inputs.tag || matrix.package.security_tag) }}
      only-high-critical: ${{ matrix.package.security_only_high_critical }}
      trivy-scan: ${{ matrix.package.security_trivy_scan }}
      grype-scan: ${{ matrix.package.security_grype_scan }}
      only-fixed: ${{ matrix.package.security_only_fixed }}
      continue-on-error: ${{ matrix.package.security_continue_on_error }}

  security-scan-matrix-manual:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.image == '' || inputs.image == null) }}
    permissions:
      contents: read
      security-events: write
      packages: read
    needs: load-config
    strategy:
      matrix:
        package: ${{ fromJson(needs.load-config.outputs.packages) }}

    name: "Scan (matrix, manual overrides)"
    uses: netcracker/qubership-workflow-hub/.github/workflows/re-security-scan.yml@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
    with:
      target: ${{ inputs.target || 'docker' }}
      image: ${{ format('{0}:{1}', matrix.package.image, inputs.tag || matrix.package.security_tag) }}
      only-high-critical: ${{ inputs.only-high-critical }}
      trivy-scan: ${{ inputs.trivy-scan }}
      grype-scan: ${{ inputs.grype-scan }}
      only-fixed: ${{ inputs.only-fixed }}
      continue-on-error: ${{ inputs.continue-on-error }}

  security-scan-single:
    permissions:
      contents: read
      security-events: write
      packages: read
    if: ${{ inputs.image != '' && inputs.image != null }}
    name: "Scan (single image)"
    uses: netcracker/qubership-workflow-hub/.github/workflows/re-security-scan.yml@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
    with:
      target: ${{ inputs.target || 'docker' }}
      image: ${{ inputs.image }}
      only-high-critical: ${{ inputs.only-high-critical }}
      trivy-scan: ${{ inputs.trivy-scan }}
      grype-scan: ${{ inputs.grype-scan }}
      only-fixed: ${{ inputs.only-fixed }}
      continue-on-error: ${{ inputs.continue-on-error }}
