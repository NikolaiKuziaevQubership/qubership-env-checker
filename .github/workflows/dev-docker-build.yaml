---

# Workflow to build and publish multiple docker images based on configuration file (.qubership/docker.cfg)
# Configuration file example: config/examples/docker.cfg
# Full description of configuration file can be found in docs https://github.com/Netcracker/qubership-workflow-hub/tree/main/actions/docker-config-resolver

name: "CI: Dev Docker Build"
run-name: "Ref: ${{ github.ref_name }}. On ${{ github.event_name }}"

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'Dry run'
        required: false
        type: boolean
        default: false
      replace-symbol:
        required: false
        type: string
        default: "_"
        description: "Symbol to replace in tags"
  push:
    branches:
    - '**'
    paths-ignore:
    - '**'
    - '!.github/**'
    - '.github/workflows/dev-docker-build.yaml'
    - '!docs/**'
    - 'CODE-OF-CONDUCT.md'
    - 'CONTRIBUTING.md'
    - 'LICENSE'
    - 'README.md'
    - 'SECURITY.md'

permissions:
  contents: read

env:
  CONFIG_FILE: '.qubership/docker.cfg'

jobs:
  load-config:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      packages: ${{ steps.config.outputs.config }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Configuration File
        uses: netcracker/qubership-workflow-hub/actions/docker-config-resolver@e64a1ee2fc2f68ab44a4ef416c27d83ce36ba8e1 # v2.2.1
        id: config
        with:
          file-path: "${{ env.CONFIG_FILE }}"

  docker-build:
    name: "Build and Publish Docker Image"
    needs: load-config
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component: ${{ fromJson(needs.load-config.outputs.packages) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Create name"
        uses: netcracker/qubership-workflow-hub/actions/metadata-action@e64a1ee2fc2f68ab44a4ef416c27d83ce36ba8e1 # v2.2.1
        id: metadata
        with:
          default-template: "{{ref-name}},git-{{short-sha}}"
          extra-tags: ${{ github.event.inputs.tags || '' }}
          replace-symbol: ${{ github.event.inputs.replace-symbol || '_'}}

      - name: "Prepare tags"
        id: prepare_tags
        run: |
          BASE_TAG="${{ steps.metadata.outputs.result }}"
          EXTRA_TAG="${{ github.event.inputs.tags }}"
          TAGS="${BASE_TAG}"
          if [ -n "$EXTRA_TAG" ]; then
            TAGS="${TAGS},${EXTRA_TAG}"
          fi
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${TAGS},latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: "Summary step"
        run: |
          echo "**Metadata:** ${{ steps.metadata.outputs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.prepare_tags.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

      - name: "Build and Publish Docker Image"
        uses: netcracker/qubership-workflow-hub/actions/docker-action@e64a1ee2fc2f68ab44a4ef416c27d83ce36ba8e1 # v2.2.1
        with:
          component: ${{ toJson(matrix.component) }}
          platforms: ${{ matrix.component.platforms }}
          checkout: "false"
          tags: ${{ steps.prepare_tags.outputs.tags }}
          dry-run: ${{ github.event.inputs.dry-run || 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
